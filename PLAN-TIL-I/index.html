<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIL-Ingegneria Study Plan</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-color: #9b9b9b;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            
            --glass-bg: rgba(24, 24, 27, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            
            --accent-math: #60a5fa;
            --accent-physics: #fb923c;
            --accent-logic: #c084fc;
            --accent-reading: #34d399;
            --accent-it: #94a3b8;
            --accent-rep: #f472b6;
            
            --blob-1: #cbcbcb;
			--blob-2: #f1f1f1;
			--blob-3: #ffffff;    
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            position: relative;
        }

        /* Animated Background Blobs */
        .bg-blobs {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-color);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            animation: float 20s infinite alternate ease-in-out;
        }

        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--blob-1); }
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: var(--blob-2); animation-delay: -5s; }
        .blob-3 { top: 40%; left: 40%; width: 40vw; height: 40vw; background: var(--blob-3); animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Layout */
        .app-container {
            display: flex;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            gap: 24px;
            height: 100vh;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-container { width: 100%; }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--text-main);
            width: 0%;
            transition: width 0.4s ease;
        }
        
        /* Data Import/Export Actions */
        .data-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .data-actions button {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .data-actions button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .data-actions button svg {
            width: 14px;
            height: 14px;
        }

        .timeline {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        .day-item {
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            border: 1px solid transparent;
        }

        .day-item:hover { background: rgba(255,255,255,0.05); }
        .day-item.active {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
        }

        .day-info { display: flex; flex-direction: column; gap: 4px; }
        .day-date { font-size: 14px; font-weight: 500; }
        .day-type { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: 32px 40px;
            border-bottom: 1px solid var(--glass-border);
        }

        .content-header h2 { font-size: 32px; font-weight: 600; margin-bottom: 8px; }
        .content-header p { color: var(--text-muted); font-size: 15px; }

        .tasks-container {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Task Card */
        .task-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            gap: 20px;
            transition: all 0.3s ease;
        }

        .task-card:hover {
            background: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.15);
        }

        .task-card.completed { opacity: 0.1; background: rgba(0,0,0,0.4); }

        .checkbox-wrapper { padding-top: 4px; }

        .custom-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .custom-checkbox svg {
            width: 14px;
            height: 14px;
            stroke: var(--bg-color);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s ease;
        }

        .task-card.completed .custom-checkbox {
            background: var(--text-main);
            border-color: var(--text-main);
        }
        .task-card.completed .custom-checkbox svg {
            opacity: 1;
            transform: scale(1);
        }

        .task-details { flex: 1; }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid;
        }

        .badge-time, .badge-type { color: var(--text-muted); border-color: var(--glass-border); }

        .task-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 12px;
        }
        
        .task-card.completed .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .llm-prompt {
            background: rgba(0,0,0,0.3);
            padding: 16px;
            border-radius: 8px;
            border-left: 3px solid rgba(255,255,255,0.2);
            font-size: 14px;
            color: #d4d4d8;
            line-height: 1.5;
            user-select: all;
        }

        .prompt-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            user-select: none;
        }

        /* Subject Colors */
        .subj-math { color: var(--accent-math); border-color: rgba(96, 165, 250, 0.3); background: rgba(96, 165, 250, 0.05); }
        .subj-physics { color: var(--accent-physics); border-color: rgba(251, 146, 60, 0.3); background: rgba(251, 146, 60, 0.05); }
        .subj-logic { color: var(--accent-logic); border-color: rgba(192, 132, 252, 0.3); background: rgba(192, 132, 252, 0.05); }
        .subj-reading { color: var(--accent-reading); border-color: rgba(52, 211, 153, 0.3); background: rgba(52, 211, 153, 0.05); }
        .subj-rep { color: var(--accent-rep); border-color: rgba(244, 114, 182, 0.3); background: rgba(244, 114, 182, 0.05); }
        .subj-it { color: var(--accent-it); border-color: rgba(148, 163, 184, 0.3); background: rgba(148, 163, 184, 0.05); }
        .subj-sim { color: #facc15; border-color: rgba(250, 204, 21, 0.3); background: rgba(250, 204, 21, 0.05); }

        /* Special Days */
        .special-day-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--text-muted);
        }
        
        .special-day-container svg { width: 64px; height: 64px; margin-bottom: 24px; opacity: 0.5; }

        @media (max-width: 900px) {
            .app-container { flex-direction: column; height: auto; min-height: 100vh; padding: 16px; }
            .sidebar { width: 100%; height: auto; max-height: 350px; flex-shrink: 0; }
            .main-content { height: calc(100vh - 380px); min-height: 600px; }
            .content-header { padding: 24px; }
            .tasks-container { padding: 24px; }
            .task-card { flex-direction: column; gap: 12px; }
            .checkbox-wrapper { align-self: flex-start; }
        }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        
        <aside class="glass-panel sidebar">
            <div class="sidebar-header">
                <h1><i data-lucide="graduation-cap"></i> Plan TIL-I</h1>
                <div class="progress-container">
                    <div class="progress-stats">
                        <span>Progresso globale</span>
                        <span id="progress-text">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progress-bar"></div>
                    </div>
                </div>
                
                <!-- Import / Export Actions -->
                <div class="data-actions">
                    <button onclick="triggerImport()" title="Carica progresso salvato">
                        <i data-lucide="upload"></i> Importa
                    </button>
                    <button onclick="exportData()" title="Scarica progresso attuale">
                        <i data-lucide="download"></i> Esporta
                    </button>
                </div>
                <!-- Hidden file input for import -->
                <input type="file" id="import-file" accept=".json" style="display: none;" onchange="handleImport(event)">

            </div>
            <div class="timeline" id="timeline"></div>
        </aside>

        <main class="glass-panel main-content">
            <div class="content-header" id="content-header"></div>
            <div class="tasks-container" id="tasks-container"></div>
        </main>

    </div>

    <script>
        // -- Data Definition --
        const studyPlan = [
            {
                date: "2024-07-02", label: "02 Luglio", type: "studio",
                title: "Giorno 1: Fondamenti Algebra e Cinematica",
                desc: "Inizio intenso sulle basi assolute di Matematica e Fisica.",
                tasks: [
                    { id: "02-1", subj: "math", subjLabel: "Matematica", time: "2h 30m", type: "Teoria + Esercizi", title: "Insiemi numerici, Monomi, Polinomi", prompt: "Agisci come tutor per il test di ammissione TIL-Ingegneria. Spiega in modo conciso le regole di base dei numeri reali (frazioni, potenze, radicali). Successivamente, genera 10 espressioni con monomi e polinomi (inclusa fattorizzazione e prodotti notevoli) con livello di difficoltà da test universitario. Non fornire le soluzioni subito; aspetta che te le chieda." },
                    { id: "02-2", subj: "physics", subjLabel: "Fisica", time: "2h 30m", type: "Teoria + Esercizi", title: "Vettori, Grandezze e Cinematica 1D", prompt: "Agisci come tutor per il test TIL-Ingegneria. Fornisci un breve riassunto sulle unità di misura del Sistema Internazionale e sulla scomposizione dei vettori (somma, differenza, prodotto scalare). Spiega poi le leggi orarie del moto rettilineo uniforme e uniformemente accelerato. Infine, genera 8 problemi pratici misti a risposta multipla (5 opzioni) su questi argomenti. Fornisci le soluzioni solo su mia richiesta." },
                    { id: "02-3", subj: "logic", subjLabel: "Logica", time: "1h 00m", type: "Esercitazione", title: "Sillogismi e Deduzioni Base", prompt: "Agisci come creatore di test per il TIL-Ingegneria. Genera una batteria di 10 quiz a risposta multipla (5 opzioni) su deduzioni logiche e sillogismi classici. Fornisci solo le domande. Quando ti invierò le mie risposte (es. 1A, 2B), correggile e spiegami il ragionamento esatto per ogni eventuale errore." }
                ]
            },
            {
                date: "2024-07-03", label: "03 Luglio", type: "studio",
                title: "Giorno 2: Equazioni e Moto 2D",
                desc: "Consolidamento dell'algebra e avanzamento nella cinematica.",
                tasks: [
                    { id: "03-1", subj: "math", subjLabel: "Matematica", time: "2h 30m", type: "Teoria + Esercizi", title: "Equazioni e Disequazioni (I e II grado)", prompt: "Agisci come tutor di matematica per il TIL-Ingegneria. Ripassiamo le regole di risoluzione per equazioni e disequazioni di 1° e 2° grado (inclusi sistemi e studio del discriminante). Genera 15 esercizi rapidi a risposta multipla (5 opzioni) in cui devo trovare gli intervalli di soluzione. Dammi solo le domande, le soluzioni le chiederò dopo." },
                    { id: "03-2", subj: "physics", subjLabel: "Fisica", time: "2h 00m", type: "Teoria + Esercizi", title: "Cinematica 2D (Parabolico, Circolare)", prompt: "Agisci come tutor di fisica per il test universitario TIL. Spiegami le formule del moto parabolico e del moto circolare uniforme (velocità angolare, tangenziale, accelerazione centripeta). Genera poi 6 esercizi a risposta multipla (5 opzioni, assumendo g = 9.8 m/s²) su questi moti. Mostrami solo i testi dei problemi." },
                    { id: "03-3", subj: "reading", subjLabel: "Comprensione", time: "45m", type: "Mantenimento", title: "Lettura Analitica", prompt: "Agisci come esaminatore per il test TIL-Ingegneria. Genera un testo di divulgazione scientifica di circa 400 parole. Formula poi 5 domande a risposta multipla (5 opzioni) basate RIGOROSAMENTE su ciò che è scritto nel testo (inferenze, significato di termini, scopo dell'autore). Aspetta le mie risposte per la correzione." },
                    { id: "03-4", subj: "logic", subjLabel: "Logica", time: "45m", type: "Esercitazione", title: "Condizioni Suff/Nec", prompt: "Agisci come tutor di logica per il test di ammissione a Ingegneria. Spiegami la differenza formale tra condizione necessaria e condizione sufficiente. Successivamente, crea 8 quiz a risposta multipla (5 opzioni) a trabocchetto su questo specifico argomento. Aspetta le mie risposte." }
                ]
            },
            {
                date: "2024-07-04", label: "04 Luglio", type: "studio",
                title: "Giorno 3: Geometria Analitica e Dinamica",
                desc: "Si entra nel vivo con lo studio delle forze e del piano cartesiano.",
                tasks: [
                    { id: "04-1", subj: "math", subjLabel: "Matematica", time: "2h 30m", type: "Teoria + Esercizi", title: "Geometria Analitica (Retta e Circonferenza)", prompt: "Agisci come tutor per il TIL-Ingegneria. Spiegami l'equazione della retta nel piano cartesiano, le condizioni di parallelismo/perpendicolarità e la distanza punto-retta. Poi spiegami l'equazione della circonferenza. Genera 10 problemi a risposta multipla dove devo ricavare equazioni, centri, raggi o intersezioni. Soluzioni solo su richiesta." },
                    { id: "04-2", subj: "physics", subjLabel: "Fisica", time: "2h 30m", type: "Teoria + Esercizi", title: "Dinamica (Leggi di Newton e Attrito)", prompt: "Agisci come tutor di fisica per il TIL-Ingegneria. Spiega i 3 principi della dinamica e le formule per le forze (peso, elastica, attrito statico/dinamico, tensione). Proponimi 6 problemi a risposta multipla (5 opzioni) che coinvolgono piani inclinati, carrucole e masse collegate. Aspetta che io provi a risolverli." },
                    { id: "04-3", subj: "rep", subjLabel: "Rappresentazione", time: "1h 30m", type: "Teoria + Esercizi", title: "Fondamenti Proiezioni Ortogonali", prompt: "Agisci come professore di disegno tecnico per il test TIL. Spiegami dettagliatamente le basi delle proiezioni ortogonali (Pianta, Prospetto, Profilo). Poiché comunichiamo in modo testuale, descrivimi a parole 5 oggetti 3D semplici (es. un cubo con uno spigolo smussato) e ponimi delle domande a risposta multipla su come apparirebbero le loro viste bidimensionali." }
                ]
            },
            {
                date: "2024-07-05", label: "05 Luglio", type: "studio",
                title: "Giorno 4: Coniche ed Energia",
                desc: "Completamento geometria analitica e meccanica del punto.",
                tasks: [
                    { id: "05-1", subj: "math", subjLabel: "Matematica", time: "2h 00m", type: "Teoria + Esercizi", title: "Geometria Analitica (Ellisse, Parabola, Iperbole)", prompt: "Agisci come tutor per il test di ingegneria. Riassumi le equazioni canoniche e le proprietà (fuochi, vertici, asintoti) di ellisse, parabola e iperbole. Genera 8 quiz a risposta multipla (5 opzioni) in cui devo riconoscere la conica dall'equazione o trovarne gli elementi caratteristici. Non mostrare le soluzioni." },
                    { id: "05-2", subj: "physics", subjLabel: "Fisica", time: "2h 30m", type: "Teoria + Esercizi", title: "Lavoro, Energia, Conservazione", prompt: "Agisci come tutor per il test TIL. Spiega i concetti di lavoro, potenza, energia cinetica, energia potenziale gravitazionale ed elastica. Illustra il teorema dell'energia cinetica e la conservazione dell'energia meccanica. Genera 8 problemi classici a risposta multipla (es. pendolo, montagne russe, blocco contro molla). Aspetta le mie risposte." },
                    { id: "05-3", subj: "logic", subjLabel: "Logica", time: "45m", type: "Esercitazione", title: "Negazione di proposizioni", prompt: "Agisci come tutor di logica. Spiegami le regole di De Morgan e come si negano affermazioni contenenti quantificatori (tutti, almeno uno, nessuno, solo). Poi, proponimi 10 frasi da negare tramite domande a risposta multipla (5 opzioni per ciascuna). Dammi solo i quiz." }
                ]
            },
            {
                date: "2024-07-06", label: "06 Luglio", type: "studio",
                title: "Giorno 5: Esponenziali e Fluidi",
                desc: "Nuovi argomenti su funzioni trascendenti e meccanica dei fluidi.",
                tasks: [
                    { id: "06-1", subj: "math", subjLabel: "Matematica", time: "2h 30m", type: "Teoria + Esercizi", title: "Esponenziali e Logaritmi", prompt: "Agisci come tutor di matematica per il TIL. Definisci la funzione esponenziale e logaritmica. Elenca tutte le proprietà dei logaritmi (cambio base, somma, prodotto, potenze). Crea 12 quesiti a risposta multipla su equazioni e disequazioni esponenziali e logaritmiche di difficoltà crescente. Niente soluzioni in anticipo." },
                    { id: "06-2", subj: "physics", subjLabel: "Fisica", time: "2h 00m", type: "Teoria + Esercizi", title: "Meccanica dei Fluidi", prompt: "Agisci come tutor di fisica per il test TIL. Spiega pressione idrostatica, legge di Stevino, spinta di Archimede, portata, equazione di continuità e teorema di Bernoulli/Torricelli. Genera 8 problemi a risposta multipla su galleggiamento, tubi a U e fori in serbatoi. Attendi le mie risposte." },
                    { id: "06-3", subj: "it", subjLabel: "Informatica", time: "1h 30m", type: "Ripasso Rapido", title: "Ripasso generale IT", prompt: "Agisci come tutor informatico per il test TIL-Ingegneria. Conosco già la programmazione, quindi fammi un ripasso a punti strettissimo solo sui concetti teorici richiesti dal bando: differenze compilato/interpretato, modelli di sistema operativo, basi reti (IP, Firewall, Web Server), logica booleana e multithreading. Fai seguire 10 domande a risposta multipla su questi temi." }
                ]
            },
            {
                date: "2024-07-07", label: "07 Luglio", type: "simulazione",
                title: "Giorno 6: Prima Simulazione Completa",
                desc: "Prima verifica generale a tempo (90 min).",
                tasks: [

        // -- Application Logic --
        let currentDayIndex = 0;
        let completedTasks = new Set();

        const typeIcons = {
            "Teoria + Esercizi": "book",

            "Ripasso": "rotate-cw",
            "Ripasso Rapido": "zap",
            "Mantenimento": "book-open",
            "Test A Tempo": "timer",
            "Analisi Errori": "search",
            "Ripasso Mentale": "brain"
        };

        const subjectIcons = {
            "math": "calculator",
            "physics": "atom",
            "logic": "brain-circuit",
            "reading": "align-left",
            "rep": "box",
            "it": "monitor",
            "sim": "flag"
        };

        function init() {
            loadState();
            
            const today = new Date().toISOString().split('T')[0];
            const foundIndex = studyPlan.findIndex(d => d.date === today);
            currentDayIndex = foundIndex !== -1 ? foundIndex : 0; 
            
            renderSidebar();
            renderContent();
            updateProgress();
            lucide.createIcons();
        }

        function loadState() {
            const saved = localStorage.getItem('til_completed_tasks');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if(Array.isArray(parsed)) {
                        completedTasks = new Set(parsed);
                    }
                } catch(e) {
                    console.error("Error loading state", e);
                }
            }
        }

        function saveState() {
            localStorage.setItem('til_completed_tasks', JSON.stringify(Array.from(completedTasks)));
        }

        function toggleTask(taskId) {
            if (completedTasks.has(taskId)) {
                completedTasks.delete(taskId);
            } else {
                completedTasks.add(taskId);
            }
            saveState();
            updateProgress();
            
            const card = document.getElementById(`task-${taskId}`);
            if (card) {
                card.classList.toggle('completed');
            }
            renderSidebar(); 
        }

        function updateProgress() {
            let total = 0;
            let done = 0;
            
            studyPlan.forEach(day => {
                day.tasks.forEach(task => {
                    total++;
                    if (completedTasks.has(task.id)) done++;
                });
            });

            const percentage = total === 0 ? 0 : Math.round((done / total) * 100);
            
            document.getElementById('progress-text').textContent = `${percentage}%`;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
        }

        function selectDay(index) {
            currentDayIndex = index;
            renderSidebar();
            renderContent();
        }

        function renderSidebar() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            studyPlan.forEach((day, index) => {
                const item = document.createElement('div');
                item.className = `day-item ${index === currentDayIndex ? 'active' : ''}`;
                item.onclick = () => selectDay(index);

                let dayTotal = day.tasks.length;
                let dayDone = day.tasks.filter(t => completedTasks.has(t.id)).length;
                let statusColor = "rgba(255,255,255,0.2)";
                
                if (day.type === 'vacanza' || day.type === 'esame') {
                    statusColor = "var(--accent-reading)";
                } else if (dayTotal > 0 && dayDone === dayTotal) {
                    statusColor = "var(--accent-reading)";
                } else if (dayDone > 0) {
                    statusColor = "var(--accent-physics)";
                }

                item.innerHTML = `
                    <div class="day-info">
                        <span class="day-date">${day.label}</span>
                        <span class="day-type">${day.type}</span>
                    </div>
                    <div style="width: 8px; height: 8px; border-radius: 50%; background: ${statusColor};"></div>
                `;
                timeline.appendChild(item);
            });
        }

        function renderContent() {
            const day = studyPlan[currentDayIndex];
            
            const header = document.getElementById('content-header');
            header.innerHTML = `
                <h2>${day.title}</h2>
                <p>${day.desc}</p>
            `;

            const container = document.getElementById('tasks-container');
            container.innerHTML = '';

            if (day.type === 'vacanza') {
                container.innerHTML = `
                    <div class="special-day-container">
                        <i data-lucide="coffee"></i>
                        <h3>Giorno di Pausa</h3>
                        <p>Nessuna attività programmata per oggi. Ricarica le energie!</p>
                    </div>
                `;
            } else if (day.type === 'esame') {
                container.innerHTML = `
                    <div class="special-day-container" style="color: var(--accent-reading)">
                        <i data-lucide="award"></i>
                        <h3>Giorno del Test</h3>
                        <p>Ingegneria ti aspetta. Dai il massimo!</p>
                    </div>
                `;
            } else {
                day.tasks.forEach(task => {
                    const isDone = completedTasks.has(task.id);

                    const subjIcon = subjectIcons[task.subj] || "book";
                    
                    const card = document.createElement('div');
                    card.className = `task-card ${isDone ? 'completed' : ''}`;
                    card.id = `task-${task.id}`;
                    
                    card.innerHTML = `

                            <div class="task-meta">
                                <span class="badge subj-${task.subj}">
                                    <i data-lucide="${subjIcon}" style="width: 12px; height: 12px;"></i>
                                    ${task.subjLabel}
                                </span>
                                <span class="badge badge-time">
                                    <i data-lucide="clock" style="width: 12px; height: 12px;"></i>
                                    ${task.time}
                                </span>
                                <span class="badge badge-type">
                                    <i data-lucide="${iconName}" style="width: 12px; height: 12px;"></i>
                                    ${task.type}
                                </span>
                            </div>
                            <h3 class="task-title">${task.title}</h3>
                            <div class="llm-prompt">
                                <div class="prompt-label">
                                    <i data-lucide="terminal" style="width: 14px; height: 14px;"></i> Prompt Zero-Shot (Copia per l'LLM)
                                </div>
                                "${task.prompt}"
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }

            lucide.createIcons();
        }

        // --- Data Import/Export Logic ---
        function exportData() {
            const dataStr = JSON.stringify(Array.from(completedTasks));
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `til_progresso_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function triggerImport() {
            document.getElementById('import-file').click();
        }

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        completedTasks = new Set(data);
                        saveState();
                        updateProgress();
                        renderSidebar();
                        renderContent();
                        alert("Progresso importato con successo!");
                    } else {
                        alert("Il file selezionato non ha un formato valido.");
                    }
                } catch (err) {
                    alert("Si è verificato un errore durante la lettura del file.");
                }
                // Reset per consentire di re-importare lo stesso file
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
