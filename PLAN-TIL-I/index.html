<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIL-Ingegneria 5-Day Bootcamp</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-color: #18181b; /* Scurito per un look più "focus" */
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            
            --glass-bg: rgba(24, 24, 27, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            
            --accent-math: #60a5fa;
            --accent-physics: #fb923c;
            --accent-logic: #c084fc;
            --accent-reading: #34d399;
            --accent-it: #94a3b8;
            --accent-rep: #f472b6;
            
            --blob-1: #3f3f46;
			--blob-2: #27272a;
			--blob-3: #52525b;    
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            position: relative;
        }

        /* Animated Background Blobs */
        .bg-blobs {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-color);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            animation: float 20s infinite alternate ease-in-out;
        }

        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--blob-1); }
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: var(--blob-2); animation-delay: -5s; }
        .blob-3 { top: 40%; left: 40%; width: 40vw; height: 40vw; background: var(--blob-3); animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Layout */
        .app-container {
            display: flex;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            gap: 24px;
            height: 100vh;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ef4444; /* Rosso urgenza */
        }

        .progress-container { width: 100%; }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: #ef4444;
            width: 0%;
            transition: width 0.4s ease;
        }
        
        .data-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .data-actions button {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .data-actions button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .timeline {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        .day-item {
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            border: 1px solid transparent;
        }

        .day-item:hover { background: rgba(255,255,255,0.05); }
        .day-item.active {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
        }

        .day-info { display: flex; flex-direction: column; gap: 4px; }
        .day-date { font-size: 14px; font-weight: 500; }
        .day-type { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: 32px 40px;
            border-bottom: 1px solid var(--glass-border);
        }

        .content-header h2 { font-size: 32px; font-weight: 600; margin-bottom: 8px; }
        .content-header p { color: var(--text-muted); font-size: 15px; }

        .tasks-container {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Task Card */
        .task-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            gap: 20px;
            transition: all 0.3s ease;
        }

        .task-card:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.2);
        }

        .task-card.completed { opacity: 0.3; background: rgba(0,0,0,0.5); }

        .checkbox-wrapper { padding-top: 4px; }

        .custom-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .custom-checkbox svg {
            width: 14px;
            height: 14px;
            stroke: var(--bg-color);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s ease;
        }

        .task-card.completed .custom-checkbox {
            background: var(--text-main);
            border-color: var(--text-main);
        }
        .task-card.completed .custom-checkbox svg {
            opacity: 1;
            transform: scale(1);
        }

        .task-details { flex: 1; }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid;
        }

        .badge-time, .badge-type { color: var(--text-muted); border-color: var(--glass-border); }

        .task-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 12px;
        }
        
        .task-card.completed .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .llm-prompt {
            background: rgba(0,0,0,0.4);
            padding: 16px;
            border-radius: 8px;
            border-left: 3px solid rgba(255,255,255,0.2);
            font-size: 14px;
            color: #d4d4d8;
            line-height: 1.5;
            user-select: all;
        }

        .prompt-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            user-select: none;
        }

        /* Subject Colors */
        .subj-math { color: var(--accent-math); border-color: rgba(96, 165, 250, 0.3); background: rgba(96, 165, 250, 0.05); }
        .subj-physics { color: var(--accent-physics); border-color: rgba(251, 146, 60, 0.3); background: rgba(251, 146, 60, 0.05); }
        .subj-logic { color: var(--accent-logic); border-color: rgba(192, 132, 252, 0.3); background: rgba(192, 132, 252, 0.05); }
        .subj-reading { color: var(--accent-reading); border-color: rgba(52, 211, 153, 0.3); background: rgba(52, 211, 153, 0.05); }
        .subj-rep { color: var(--accent-rep); border-color: rgba(244, 114, 182, 0.3); background: rgba(244, 114, 182, 0.05); }
        .subj-it { color: var(--accent-it); border-color: rgba(148, 163, 184, 0.3); background: rgba(148, 163, 184, 0.05); }
        .subj-sim { color: #facc15; border-color: rgba(250, 204, 21, 0.3); background: rgba(250, 204, 21, 0.05); }

        .special-day-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--text-muted);
        }
        
        .special-day-container svg { width: 64px; height: 64px; margin-bottom: 24px; opacity: 0.5; }

        @media (max-width: 900px) {
            .app-container { flex-direction: column; height: auto; min-height: 100vh; padding: 16px; }
            .sidebar { width: 100%; height: auto; max-height: 350px; flex-shrink: 0; }
            .main-content { height: calc(100vh - 380px); min-height: 600px; }
            .content-header { padding: 24px; }
            .tasks-container { padding: 24px; }
            .task-card { flex-direction: column; gap: 12px; }
            .checkbox-wrapper { align-self: flex-start; }
        }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        
        <aside class="glass-panel sidebar">
            <div class="sidebar-header">
                <h1><i data-lucide="flame"></i> TIL 5-Day Sprint</h1>
                <div class="progress-container">
                    <div class="progress-stats">
                        <span>Progresso Bootcamp</span>
                        <span id="progress-text">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progress-bar"></div>
                    </div>
                </div>
                
                <div class="data-actions">
                    <button onclick="triggerImport()" title="Carica progresso salvato">
                        <i data-lucide="upload"></i> Importa
                    </button>
                    <button onclick="exportData()" title="Scarica progresso attuale">
                        <i data-lucide="download"></i> Esporta
                    </button>
                </div>
                <input type="file" id="import-file" accept=".json" style="display: none;" onchange="handleImport(event)">
            </div>
            <div class="timeline" id="timeline"></div>
        </aside>

        <main class="glass-panel main-content">
            <div class="content-header" id="content-header"></div>
            <div class="tasks-container" id="tasks-container"></div>
        </main>

    </div>

    <script>
        // -- NUOVO PIANO DI STUDI: BOOTCAMP DI 5 GIORNI --
        // Regola base: Esercizi PRIMA della teoria. Teoria solo sugli errori. Ottimizzazione del tempo.
        const studyPlan = [
            {
                date: "2026-07-02", label: "02 Luglio", type: "storico",
                title: "Giorno 1: Storico Completato",
                desc: "Attività completate prima del cambio di strategia.",
                tasks: [
                    { id: "02-1", subj: "math", subjLabel: "Matematica", time: "Completato", type: "Archivio", title: "Algebra Base", prompt: "Completato." },
                    { id: "02-2", subj: "physics", subjLabel: "Fisica", time: "Completato", type: "Archivio", title: "Cinematica 1D", prompt: "Completato." }
                ]
            },
            {
                date: "2026-07-03", label: "03 Luglio", type: "storico",
                title: "Giorno 2: Storico Completato",
                desc: "Attività completate prima del cambio di strategia.",
                tasks: [
                    { id: "03-1", subj: "math", subjLabel: "Matematica", time: "Completato", type: "Archivio", title: "Equazioni e Disequazioni", prompt: "Completato." }
                ]
            },
            {
                date: "2026-07-15", label: "15 Luglio", type: "studio intensivo",
                title: "Giorno 1 Sprint: Geometria Analitica e Dinamica",
                desc: "Basta leggere, si passa ai test. Facciamo emergere le lacune sugli argomenti più probabili e colpiamo solo quelle.",
                tasks: [
                    { id: "15-1", subj: "math", subjLabel: "Matematica", time: "1h 30m", type: "Drill Analitico", title: "Diagnostic: Rette, Circonferenze, Parabole", prompt: "Mancano 5 giorni al TIL-Ingegneria. Non spiegarmi la teoria in anticipo. Fammi un test diagnostico di 12 domande a risposta multipla (5 opzioni) su Geometria Analitica: Equazione della retta, parallelismo/perpendicolarità, circonferenza (centro/raggio) e parabola. Voglio solo le domande. Quando ti darò le risposte, dimmi quali ho sbagliato, spiegami SOLO la regola che mi manca e dammi il 'trucco' più veloce per risolverle senza fare troppi calcoli." },
                    { id: "15-2", subj: "math", subjLabel: "Matematica", time: "1h 30m", type: "Drill Analitico", title: "Diagnostic: Esponenziali e Logaritmi", prompt: "Mancano 5 giorni al test TIL. Genera un test diagnostico di 10 domande a risposta multipla su proprietà dei logaritmi ed equazioni/disequazioni esponenziali. Inserisci casi tipici da test universitario. Aspetta le mie risposte, poi correggimi focalizzandoti sulle 'furbizie' algebriche per risolvere a occhio." },
                    { id: "15-3", subj: "physics", subjLabel: "Fisica", time: "2h 00m", type: "Drill Analitico", title: "Diagnostic: Dinamica ed Energia", prompt: "Preparazione emergenza TIL. Genera 10 problemi a risposta multipla (5 opzioni) su: Leggi di Newton, attrito, lavoro, energia cinetica, energia potenziale e conservazione dell'energia. Mettimi alla prova. Non darmi soluzioni finché non rispondo. Se sbaglio, spiegami come avrei potuto escludere le risposte palesemente errate tramite l'analisi dimensionale o il buon senso fisico." },
                    { id: "15-4", subj: "logic", subjLabel: "Logica", time: "1h 00m", type: "Speed Run", title: "Condizioni e Deduzioni", prompt: "Voglio massimizzare i punti in logica. Fammi un quiz di 10 domande a raffica su: condizione necessaria vs sufficiente, sillogismi e deduzioni. Dammi le domande una dopo l'altra oppure tutte insieme. Correggerai duramente i miei errori logici mostrandomi il 'metodo grafico' (diagrammi di Venn o frecce) per non sbagliare più." }
                ]
            },
            {
                date: "2026-07-16", label: "16 Luglio", type: "simulazione",
                title: "Giorno 2 Sprint: Prima Simulazione e Termo/Fluidi",
                desc: "Primo scontro reale con il tempo. Scopriremo esattamente quanto siamo lenti e dove recuperare minuti preziosi.",
                tasks: [
                    { id: "16-1", subj: "sim", subjLabel: "Simulazione", time: "1h 30m", type: "Test A Tempo", title: "Simulazione Diagnostica (Full)", prompt: "Agisci come il sistema del Politecnico di Torino. Genera una simulazione completa del TIL-I: 42 domande (16 Mate, 10 Fisica, 5 Comprensione, 5 Logica, 3 Rappresentazione, 3 Informatica). Le opzioni sono 5. NON FORNIRE SOLUZIONI. Questa simulazione mi serve per calibrare il tempo (90 minuti). Aspetta il mio blocco di risposte (es. 1A, 2C...)." },
                    { id: "16-2", subj: "sim", subjLabel: "Revisione", time: "1h 30m", type: "Autopsia Test", title: "Autopsia della Simulazione", prompt: "Ecco le domande della simulazione che ho sbagliato o saltato: [INCOLLA QUI DOMANDE E TUE RISPOSTE]. Non farmi una lezione accademica. Dimmi: 1) Quale formula o regola non sapevo? 2) C'era un modo per 'tirare a indovinare' con intelligenza escludendo opzioni assurde? 3) Questa domanda era da saltare a priori perché troppo lunga?" },
                    { id: "16-3", subj: "physics", subjLabel: "Fisica", time: "2h 00m", type: "Drill Analitico", title: "Termodinamica e Fluidi Base", prompt: "Crash course pratico. Genera 10 quiz a risposta multipla su: Legge di Stevino, Archimede, equazione di stato dei gas ideali, calore specifico e I Principio della termodinamica. Domande classiche da test, niente calcoli mostruosi. Valuta le mie risposte e dammi un formulario ultra-compatto su questi due argomenti." },
                    { id: "16-4", subj: "math", subjLabel: "Matematica", time: "1h 00m", type: "Drill Analitico", title: "Goniometria e Trigonometria Flash", prompt: "Trigonometria in pillole. Fammi 8 quiz a risposta multipla incentrati su: angoli notevoli, relazione fondamentale, formule di addizione (base) e grafici di seno/coseno. Verifica se so ricavare i valori a mente. Correggimi dopo." }
                ]
            },
            {
                date: "2026-07-17", label: "17 Luglio", type: "studio intensivo",
                title: "Giorno 3 Sprint: Elettromagnetismo e Punti Facili (IT/Rep)",
                desc: "Giornata dedicata a raschiare il barile dei punti: le materie minori e i circuiti fisici che sono pura applicazione di formule.",
                tasks: [
                    { id: "17-1", subj: "physics", subjLabel: "Fisica", time: "2h 00m", type: "Drill Analitico", title: "Elettrostatica e Circuiti", prompt: "Genera 12 quiz a risposta multipla su: Legge di Coulomb, Campo Elettrico, Potenziale e Circuiti DC (Leggi di Ohm, resistenze in serie/parallelo, potenza dissipata). Attendi le mie risposte. Se sbaglio le resistenze equivalenti, spiegami il metodo più veloce per calcolarle a mente." },
                    { id: "17-2", subj: "rep", subjLabel: "Rappresentazione", time: "1h 00m", type: "Punti Facili", title: "Rappresentazione e Viste (Crash Course)", prompt: "Nel test TIL ci sono 3 domande di rappresentazione. Spiegami in 5 righe come funzionano le proiezioni ortogonali (Pianta, Prospetto, Profilo). Poi, fammi 5 test testuali di intelligenza spaziale (es. 'Immagina un cilindro tagliato obliquamente... che forma ha la sezione?')." },
                    { id: "17-3", subj: "it", subjLabel: "Informatica", time: "1h 00m", type: "Punti Facili", title: "Informatica Teorica (Crash Course)", prompt: "Nel test TIL ci sono 3 domande di informatica di base (architettura, reti, OS, logica booleana). Riassumimi i concetti CHIAVE in elenchi puntati (es. differenza RAM/ROM, TCP/IP base, porte logiche AND/OR/NOT). Poi fammi 8 domande a risposta multipla su questi concetti." },
                    { id: "17-4", subj: "reading", subjLabel: "Comprensione", time: "1h 00m", type: "Speed Run", title: "Comprensione: Lettura a Scansione", prompt: "Voglio allenare la 'lettura a scansione' per risparmiare tempo. Genera un testo di 400 parole, noioso e tecnico. Fammi 5 domande. L'obiettivo è rispondere leggendo prima le domande e cercando le keyword nel testo, NON leggendo il testo tutto dall'inizio alla fine. Attendi le mie risposte." }
                ]
            },
            {
                date: "2026-07-18", label: "18 Luglio", type: "simulazione",
                title: "Giorno 4 Sprint: Simulazione Finale e Ottimizzazione",
                desc: "Ultima simulazione vera. Dobbiamo implementare la regola d'oro: saltare subito le domande dove non si sa da dove iniziare.",
                tasks: [
                    { id: "18-1", subj: "sim", subjLabel: "Simulazione", time: "1h 30m", type: "Test A Tempo", title: "Simulazione Ufficiale #2", prompt: "Agisci come simulatore del test TIL-I. Genera 42 domande bilanciate secondo il bando ufficiale. Calibra la difficoltà per renderla medio-alta, ma con alcune domande molto facili (come nel test reale). Il mio obiettivo oggi è applicare il triage: risponderò solo a quelle di cui sono sicuro e salterò le altre per evitare il -0.25. Aspetta le mie risposte (indicherò 'S' per saltata)." },
                    { id: "18-2", subj: "sim", subjLabel: "Revisione", time: "1h 30m", type: "Autopsia Test", title: "Analisi Finale Tattica", prompt: "Ho completato l'ultima simulazione. Ecco i miei risultati: [INCOLLA RISULTATI]. Analizziamo la mia strategia: le domande che ho saltato erano davvero impossibili o mi sono arreso troppo presto? Spiegami le soluzioni delle omesse/sbagliate usando ESCLUSIVAMENTE scorciatoie e deduzioni." },
                    { id: "18-3", subj: "math", subjLabel: "Matematica", time: "1h 30m", type: "Mischia", title: "Math Mix: Radicali, Moduli, Funzioni", prompt: "Copriamo le ultime lacune algebriche. Genera 10 quiz misti su: disequazioni con valore assoluto, equazioni irrazionali e traslazione di grafici di funzioni (es. come cambia il grafico di f(x) se faccio |f(x-1)|). Attendi le mie risposte." }
                ]
            },
            {
                date: "2026-07-19", label: "19 Luglio", type: "ripasso",
                title: "Giorno 5 Sprint: Giorno Pre-Esame",

                tasks: [
                    { id: "19-1", subj: "math", subjLabel: "Matematica", time: "1h 00m", type: "Memory", title: "Dump Formulario Matematica", prompt: "Agisci come un esaminatore pignolo. Interrogami a raffica sulle formule matematiche che DEVO sapere a memoria per il TIL. Chiedimi, una alla volta, cose come 'Formula della distanza punto-retta', 'Equazione asintoti iperbole', 'Seno di 60 gradi', 'Proprietà cambio base logaritmi'. Se sbaglio o tentenno, correggimi subito." },
                    { id: "19-2", subj: "physics", subjLabel: "Fisica", time: "1h 00m", type: "Memory", title: "Dump Formulario Fisica", prompt: "Stessa cosa della matematica, ma per la fisica. Interrogami sulle formule pure: 'Energia cinetica', 'Spinta di Archimede', 'Legge dei gas perfetti', 'Resistenza equivalente in parallelo', 'Equazione oraria moto accelerato'. Risponderò velocemente." },
                    { id: "19-3", subj: "sim", subjLabel: "Strategia", time: "45m", type: "Focus", title: "Pianificazione Gara", prompt: "Domani ho il test TIL-I. Scrivimi un decalogo comportamentale (10 regole d'oro) per affrontare i 90 minuti. Parla di gestione dell'ansia, quando usare l'eliminazione delle risposte, come comportarsi se si va nel panico e la regola aurea per evitare il punteggio negativo. Deve essere un discorso motivazionale ed estremamente pragmatico." }
                ]
            },
            {
                date: "2026-07-20", label: "20 Luglio", type: "esame",
                title: "Giorno del Test: TIL-I",
                desc: "Testa bassa, respiro profondo. Leggi bene le domande. Vai a prenderti l'ammissione.",
                tasks: []
            }
        ];

        // -- Application Logic --
        let currentDayIndex = 0;
        let completedTasks = new Set();

        // Autocompleta lo storico (Giorni 1 e 2)
        const historicalTasks = ["02-1", "02-2", "03-1"];

        const typeIcons = {
            "Archivio": "archive",
            "Drill Analitico": "target",
            "Speed Run": "zap",
            "Punti Facili": "gift",
            "Test A Tempo": "timer",
            "Autopsia Test": "stethoscope",
            "Memory": "brain-circuit",
            "Mischia": "swords",
            "Focus": "crosshair"
        };

        const subjectIcons = {
            "math": "calculator",
            "physics": "atom",
            "logic": "puzzle",
            "reading": "book-open",
            "rep": "box",
            "it": "monitor",
            "sim": "flag"
        };

        function init() {
            loadState();
            
            // Forza il completamento dello storico se non già salvato
            historicalTasks.forEach(id => completedTasks.add(id));
            saveState();

            // Cerca la data di oggi o imposta sul 15 Luglio di default per la demo
            const today = new Date().toISOString().split('T')[0];
            const foundIndex = studyPlan.findIndex(d => d.date === today);
            
            // Se la data non c'è, controlliamo se siamo prima del 15 (usiamo il 15) o dopo il 20
            if (foundIndex !== -1) {
                currentDayIndex = foundIndex;
            } else {
                currentDayIndex = 2; // Default su 15 Luglio
            }
            
            renderSidebar();
            renderContent();
            updateProgress();
            lucide.createIcons();
        }

        function loadState() {
            const saved = localStorage.getItem('til_bootcamp_tasks');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if(Array.isArray(parsed)) {
                        completedTasks = new Set(parsed);
                    }
                } catch(e) {
                    console.error("Error loading state", e);
                }
            }
        }

        function saveState() {
            localStorage.setItem('til_bootcamp_tasks', JSON.stringify(Array.from(completedTasks)));
        }

        function toggleTask(taskId) {
            // Non permettere di un-checkare lo storico
            if (historicalTasks.includes(taskId)) return;

            if (completedTasks.has(taskId)) {
                completedTasks.delete(taskId);
            } else {
                completedTasks.add(taskId);
            }
            saveState();
            updateProgress();
            
            const card = document.getElementById(`task-${taskId}`);
            if (card) {
                card.classList.toggle('completed');
            }
            renderSidebar(); 
        }

        function updateProgress() {
            let total = 0;
            let done = 0;
            
            // Calcola il progresso escludendo lo storico per non falsare le % dei 5 giorni attivi
            studyPlan.forEach(day => {
                if (day.type !== 'storico') {
                    day.tasks.forEach(task => {
                        total++;
                        if (completedTasks.has(task.id)) done++;
                    });
                }
            });

            const percentage = total === 0 ? 0 : Math.round((done / total) * 100);
            
            document.getElementById('progress-text').textContent = `${percentage}%`;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
        }

        function selectDay(index) {
            currentDayIndex = index;
            renderSidebar();
            renderContent();
        }

        function renderSidebar() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            studyPlan.forEach((day, index) => {
                const item = document.createElement('div');
                item.className = `day-item ${index === currentDayIndex ? 'active' : ''}`;
                item.onclick = () => selectDay(index);

                let dayTotal = day.tasks.length;
                let dayDone = day.tasks.filter(t => completedTasks.has(t.id)).length;
                let statusColor = "rgba(255,255,255,0.2)";
                
                if (day.type === 'esame') {
                    statusColor = "var(--accent-physics)"; // Arancio per l'esame
                } else if (day.type === 'storico') {
                    statusColor = "rgba(255,255,255,0.1)"; // Grigio spento per lo storico
                } else if (dayTotal > 0 && dayDone === dayTotal) {
                    statusColor = "var(--accent-reading)"; // Verde
                } else if (dayDone > 0) {
                    statusColor = "#ef4444"; // Rosso per in progress
                }

                item.innerHTML = `
                    <div class="day-info">
                        <span class="day-date">${day.label}</span>
                        <span class="day-type" style="${day.type==='storico' ? 'color:#52525b;' : ''}">${day.type}</span>
                    </div>
                    <div style="width: 8px; height: 8px; border-radius: 50%; background: ${statusColor};"></div>
                `;
                timeline.appendChild(item);
            });
        }

        function renderContent() {
            const day = studyPlan[currentDayIndex];
            
            const header = document.getElementById('content-header');
            header.innerHTML = `
                <h2>${day.title}</h2>
                <p>${day.desc}</p>
            `;

            const container = document.getElementById('tasks-container');
            container.innerHTML = '';

            if (day.type === 'esame') {
                container.innerHTML = `
                    <div class="special-day-container" style="color: var(--accent-physics)">
                        <i data-lucide="crosshair"></i>
                        <h3>Giorno del Test</h3>
                        <p>Hai fatto il possibile in questi 5 giorni di fuoco. Applica la strategia. Salta ciò che non sai. In bocca al lupo.</p>
                    </div>
                `;
            } else if (day.type === 'storico') {
                container.innerHTML = `
                    <div class="special-day-container">
                        <i data-lucide="archive"></i>
                        <h3>Dati Archiviati</h3>
                        <p>Queste attività fanno parte del vecchio piano e sono state già assimilate.</p>
                    </div>
                `;
            } else {
                day.tasks.forEach(task => {
                    const isDone = completedTasks.has(task.id);
                    const iconName = typeIcons[task.type] || "check-circle";
                    const subjIcon = subjectIcons[task.subj] || "book";
                    const isHistorical = historicalTasks.includes(task.id);
                    
                    const card = document.createElement('div');
                    card.className = `task-card ${isDone ? 'completed' : ''}`;
                    card.id = `task-${task.id}`;
                    
                    card.innerHTML = `
                        <div class="checkbox-wrapper">
                            <div class="custom-checkbox" onclick="${isHistorical ? '' : `toggleTask('${task.id}')`}" style="${isHistorical ? 'cursor:not-allowed; border-color:var(--text-main); background:var(--text-main);' : ''}">
                                <i data-lucide="check" style="${isHistorical ? 'opacity:1; transform:scale(1);' : ''}"></i>
                            </div>
                        </div>
                        <div class="task-details">
                            <div class="task-meta">
                                <span class="badge subj-${task.subj}">
                                    <i data-lucide="${subjIcon}" style="width: 12px; height: 12px;"></i>
                                    ${task.subjLabel}
                                </span>
                                <span class="badge badge-time">
                                    <i data-lucide="clock" style="width: 12px; height: 12px;"></i>
                                    ${task.time}
                                </span>
                                <span class="badge badge-type">
                                    <i data-lucide="${iconName}" style="width: 12px; height: 12px;"></i>
                                    ${task.type}
                                </span>
                            </div>
                            <h3 class="task-title">${task.title}</h3>
                            <div class="llm-prompt">
                                <div class="prompt-label">
                                    <i data-lucide="terminal" style="width: 14px; height: 14px;"></i> Copia questo Prompt per l'AI
                                </div>
                                "${task.prompt}"
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }

            lucide.createIcons();
        }

        // --- Data Import/Export Logic ---
        function exportData() {
            const dataStr = JSON.stringify(Array.from(completedTasks));
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `til_bootcamp_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function triggerImport() {
            document.getElementById('import-file').click();
        }

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        completedTasks = new Set(data);
                        // Assicurati che lo storico rimanga spuntato
                        historicalTasks.forEach(id => completedTasks.add(id));
                        saveState();
                        updateProgress();
                        renderSidebar();
                        renderContent();
                        alert("Progresso importato con successo!");
                    } else {
                        alert("Il file selezionato non ha un formato valido.");
                    }
                } catch (err) {
                    alert("Si è verificato un errore durante la lettura del file.");
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
